<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Podcast Studio — Host</title>
  <link rel="stylesheet" href="/css/studio.css">
</head>
<body class="studio-body">
  <div class="studio-layout">

    <header class="studio-header">
      <div class="header-left">
        <a href="/" class="logo">🎙️ Podcast Studio</a>
        <span class="room-badge">Room: <strong id="roomCode">—</strong></span>
        <span class="role-badge host-badge">HOST</span>
      </div>
      <div id="status" class="status info">Starting up…</div>
    </header>

    <main class="studio-main">
      <div class="canvas-wrap">
        <canvas id="studioCanvas"></canvas>
      </div>

      <aside class="studio-sidebar">

        <section class="sidebar-section">
          <h3>Podcast Brand</h3>
          <div class="brand-fields">
            <input id="podcastName"  type="text" placeholder="Your Podcast Name" maxlength="40" />
            <input id="episodeTitle" type="text" placeholder="Episode title or number" maxlength="50" />
            <div class="brand-colour-row">
              <label for="brandColour">Accent colour</label>
              <input id="brandColour" type="color" value="#4a9eff" />
            </div>
          </div>
        </section>

        <section class="sidebar-section">
          <h3>Invite Guest</h3>
          <div class="invite-row">
            <input id="inviteLink" type="text" readonly />
            <button id="copyBtn" class="btn-small">Copy</button>
          </div>
          <p class="sidebar-hint">Send this link to your guest — they open it in Chrome</p>
        </section>

        <section class="sidebar-section">
          <h3>Speaker Detection</h3>
          <div class="detection-options">
            <label class="radio-option">
              <input type="radio" name="detection" value="off" checked />
              <div class="radio-label">
                Off
                <small>Manual control only</small>
              </div>
            </label>
            <label class="radio-option">
              <input type="radio" name="detection" value="auto" />
              <div class="radio-label">
                Auto cut
                <small>Full screen, switches on speech</small>
              </div>
            </label>
            <label class="radio-option">
              <input type="radio" name="detection" value="subtle" />
              <div class="radio-label">
                Subtle
                <small>Widens active speaker, both stay visible</small>
              </div>
            </label>
          </div>
          <div class="sensitivity-wrap" id="sensitivityWrap" style="display:none">
            <div class="sensitivity-row">
              <span>Sensitivity</span>
              <div class="sensitivity-track">
                <span class="sens-label">Slow</span>
                <input type="range" id="sensitivity" min="0" max="100" value="50" />
                <span class="sens-label">Fast</span>
              </div>
            </div>
          </div>
        </section>

        <section class="sidebar-section">
          <h3>Spotlight Style</h3>
          <div class="detection-options">
            <label class="radio-option">
              <input type="radio" name="pipStyle" value="pip" checked />
              <div class="radio-label">
                Picture in picture
                <small>Main person large, other in corner</small>
              </div>
            </label>
            <label class="radio-option">
              <input type="radio" name="pipStyle" value="full" />
              <div class="radio-label">
                Full screen
                <small>Just the main person, other hidden</small>
              </div>
            </label>
          </div>
        </section>

        <section class="sidebar-section">
          <h3>Layout</h3>
          <div class="layout-grid">
            <button class="layout-btn active" data-layout="split" title="Side by side">
              <span class="li-split"></span>
              Split
            </button>
            <button class="layout-btn" data-layout="host-main" title="You large, guest small">
              <span class="li-host-main"></span>
              You Main
            </button>
            <button class="layout-btn" data-layout="guest-main" title="Guest large, you small">
              <span class="li-guest-main"></span>
              Guest Main
            </button>
            <button class="layout-btn" data-layout="screen" title="Your screen, guest small">
              <span class="li-screen"></span>
              Screen
            </button>
          </div>
        </section>

        <div id="uploadProgress" class="upload-progress" style="display:none">
          <div class="progress-label-row">
            <span class="progress-label">Uploading…</span>
            <span class="progress-pct" id="progressPct">0%</span>
          </div>
          <div class="progress-track"><div class="progress-bar" id="progressBar"></div></div>
        </div>

        <section class="sidebar-section files-section">
          <h3>Recorded Files <button class="btn-refresh" id="refreshBtn" title="Refresh">↻</button></h3>
          <div id="fileList" class="file-list">
            <p class="empty-state">No recordings yet</p>
          </div>
        </section>

      </aside>
    </main>

    <footer class="studio-controls">
      <div class="controls-group">
        <button id="micBtn" class="ctrl-btn" title="Toggle microphone">
          <span class="ctrl-icon">🎙️</span> Mute Mic
        </button>
        <button id="camBtn" class="ctrl-btn" title="Toggle camera">
          <span class="ctrl-icon">📷</span> Hide Cam
        </button>

        <!-- Share Content button + popup menu -->
        <div class="share-content-wrap" id="shareContentWrap">
          <button id="shareContentBtn" class="ctrl-btn" title="Share content with your guest">
            <span class="ctrl-icon">📤</span> Share Content
          </button>
          <div class="content-menu" id="contentMenu" style="display:none">
            <button class="content-menu-item" id="shareScreenOpt">
              <span class="cm-icon">🖥️</span>
              <span class="cm-label">
                Screen, window or tab
                <small>Share anything on your screen</small>
              </span>
            </button>
            <button class="content-menu-item" id="shareVideoOpt">
              <span class="cm-icon">🎬</span>
              <span class="cm-label">
                Video file
                <small>Play a video from your computer</small>
              </span>
            </button>
            <button class="content-menu-item" id="shareImageOpt">
              <span class="cm-icon">🖼️</span>
              <span class="cm-label">
                Image / photo
                <small>Show a still image or graphic</small>
              </span>
            </button>
          </div>
        </div>

        <input id="mediaFileInput" type="file" accept="video/*" style="display:none" />
        <input id="imageFileInput" type="file" accept="image/*" style="display:none" />
      </div>
      <div class="controls-group" id="mediaControls" style="display:none">
        <button id="mediaPlayBtn" class="ctrl-btn">▶ Play</button>
        <span class="media-time" id="mediaTime">0:00 / 0:00</span>
        <input id="mediaScrubber" type="range" min="0" max="100" value="0" class="media-scrubber" />
        <button id="contentStopBtn" class="ctrl-btn ctrl-btn-danger">✕ Stop Sharing</button>
      </div>
      <div class="controls-group">
        <button id="recordBtn" class="ctrl-btn record-btn">
          <span class="rec-dot"></span> Start Recording
        </button>
      </div>
      <div class="controls-group">
        <span class="guest-status" id="guestStatus">⚪ No guest yet</span>
      </div>
    </footer>

  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/host.js"></script>
</body>
</html>
